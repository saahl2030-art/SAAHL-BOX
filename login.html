<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل الدخول - صندوق ساهل</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700;900&display=swap" rel="stylesheet">

  <style>
    :root{
      --primary:#1f6fa5;
      --bg:#f4f8fc;
      --line:#dfe8f1;
      --text:#16324a;
      --muted:#6e8498;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:"Tajawal", sans-serif;
      background:linear-gradient(180deg,#f8fbff,#f3f7fb);
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100vh;
    }

    .box{
      width:100%;
      max-width:420px;
      background:#fff;
      padding:24px;
      border-radius:20px;
      box-shadow:0 15px 40px rgba(0,0,0,0.08);
      border:1px solid var(--line);
    }

    h2{
      margin:0 0 10px;
      font-size:26px;
      font-weight:900;
      color:var(--text);
    }

    p{
      margin:0 0 18px;
      color:var(--muted);
      font-size:14px;
    }

    .field{
      width:100%;
      padding:13px;
      border-radius:12px;
      border:1px solid var(--line);
      margin-bottom:12px;
      font-size:14px;
    }

    .field:focus{
      outline:none;
      border-color:var(--primary);
    }

    .type-box{
      display:flex;
      gap:10px;
      margin-bottom:14px;
    }

    .type-btn{
      flex:1;
      padding:12px;
      border-radius:12px;
      border:1px solid var(--line);
      cursor:pointer;
      text-align:center;
      font-weight:900;
      background:#fff;
    }

    .type-btn.active{
      background:var(--primary);
      color:#fff;
      border-color:var(--primary);
    }

    .btn{
      width:100%;
      padding:14px;
      border:none;
      border-radius:14px;
      background:var(--primary);
      color:#fff;
      font-size:15px;
      font-weight:900;
      cursor:pointer;
    }

    .btn:hover{
      opacity:.9;
    }

    .links{
      margin-top:14px;
      display:flex;
      justify-content:space-between;
      font-size:13px;
    }

    .links a{
      color:var(--primary);
      font-weight:700;
    }

  </style>
</head>
<body>

  <div class="box">
    <h2>تسجيل الدخول</h2>
    <p>أدخل بياناتك للوصول إلى حسابك</p>

    <!-- اختيار نوع الحساب -->
    <div class="type-box">
      <div class="type-btn active" id="managerBtn">مدير جمعية</div>
      <div class="type-btn" id="adminBtn">أدمن</div>
    </div>

    <form id="loginForm">
      <input class="field" type="text" placeholder="البريد أو رقم الهاتف" required>
      <input class="field" type="password" placeholder="كلمة المرور" required>

      <button class="btn" type="submit">دخول</button>
    </form>

    <div class="links">
      <a href="auth.html">إنشاء حساب</a>
      <a href="index.html">العودة للرئيسية</a>
    </div>
  </div>

  <script>
    let accountType = "manager";

    const managerBtn = document.getElementById("managerBtn");
    const adminBtn = document.getElementById("adminBtn");

    managerBtn.onclick = () => {
      accountType = "manager";
      managerBtn.classList.add("active");
      adminBtn.classList.remove("active");
    };

    adminBtn.onclick = () => {
      accountType = "admin";
      adminBtn.classList.add("active");
      managerBtn.classList.remove("active");
    };

    document.getElementById("loginForm").addEventListener("submit", function(e){
      e.preventDefault();

      // توجيه حسب نوع الحساب
      if(accountType === "admin"){
        window.location.href = "admin.html";
      } else {
        window.location.href = "dashboard.html";
      }
    });
  </script>

</body>
</html>
