<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل الدخول - صندوق ساهل</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700;900&display=swap" rel="stylesheet">

  <style>
    :root{
      --primary:#1f6fa5;
      --primary-dark:#185781;
      --bg:#f4f8fc;
      --line:#dfe8f1;
      --text:#16324a;
      --muted:#6e8498;
      --panel:#ffffff;
      --green:#138a59;
      --green-soft:#e8f8f1;
      --red:#c53b3b;
      --red-soft:#fdeeee;
      --shadow:0 15px 40px rgba(0,0,0,0.08);
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:"Tajawal", sans-serif;
      background:linear-gradient(180deg,#f8fbff,#f3f7fb);
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100vh;
      padding:20px;
      color:var(--text);
    }

    .box{
      width:100%;
      max-width:420px;
      background:var(--panel);
      padding:24px;
      border-radius:20px;
      box-shadow:var(--shadow);
      border:1px solid var(--line);
    }

    h2{
      margin:0 0 10px;
      font-size:26px;
      font-weight:900;
      color:var(--text);
    }

    p{
      margin:0 0 18px;
      color:var(--muted);
      font-size:14px;
      line-height:1.8;
    }

    .type-box{
      display:flex;
      gap:10px;
      margin-bottom:14px;
    }

    .type-btn{
      flex:1;
      padding:12px;
      border-radius:12px;
      border:1px solid var(--line);
      text-align:center;
      font-weight:900;
      background:var(--primary);
      color:#fff;
      border-color:var(--primary);
    }

    .field{
      width:100%;
      padding:13px;
      border-radius:12px;
      border:1px solid var(--line);
      margin-bottom:12px;
      font-size:14px;
      background:#fff;
      color:var(--text);
    }

    .field:focus{
      outline:none;
      border-color:var(--primary);
      box-shadow:0 0 0 4px rgba(31,111,165,.08);
    }

    .btn{
      width:100%;
      padding:14px;
      border:none;
      border-radius:14px;
      background:var(--primary);
      color:#fff;
      font-size:15px;
      font-weight:900;
      cursor:pointer;
      transition:.2s ease;
    }

    .btn:hover{
      background:var(--primary-dark);
    }

    .btn:disabled{
      opacity:.7;
      cursor:not-allowed;
    }

    .links{
      margin-top:14px;
      display:flex;
      justify-content:space-between;
      gap:12px;
      font-size:13px;
      flex-wrap:wrap;
    }

    .links a{
      color:var(--primary);
      font-weight:700;
      text-decoration:none;
    }

    .error-box,
    .success-box{
      display:none;
      margin-top:14px;
      padding:12px 14px;
      border-radius:14px;
      font-size:14px;
      font-weight:700;
      line-height:1.8;
    }

    .error-box{
      background:var(--red-soft);
      color:var(--red);
    }

    .success-box{
      background:var(--green-soft);
      color:var(--green);
    }

    .error-box.show,
    .success-box.show{
      display:block;
    }
  </style>
</head>
<body>

  <div class="box">
    <h2>تسجيل الدخول</h2>
    <p>أدخل بريدك الإلكتروني وكلمة المرور للوصول إلى لوحة مدير الجمعية</p>

    <div class="type-box">
      <div class="type-btn">مدير الجمعية</div>
    </div>

    <form id="loginForm">
      <input
        class="field"
        id="email"
        type="email"
        placeholder="البريد الإلكتروني"
        required
      >

      <input
        class="field"
        id="password"
        type="password"
        placeholder="كلمة المرور"
        required
      >

      <button class="btn" id="loginBtn" type="submit">دخول</button>
    </form>

    <div class="error-box" id="errorBox"></div>
    <div class="success-box" id="successBox"></div>

    <div class="links">
      <a href="auth.html">إنشاء حساب</a>
      <a href="index.html">العودة للرئيسية</a>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

    const SUPABASE_URL = 'https://qxyrpnexybxmfmtrnzpg.supabase.co'
    const SUPABASE_ANON_KEY = 'sb_publishable_QIxCZZAQvM_tBEPJp5-IDg_m9hZRHAT'

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    const loginForm = document.getElementById('loginForm')
    const loginBtn = document.getElementById('loginBtn')
    const errorBox = document.getElementById('errorBox')
    const successBox = document.getElementById('successBox')

    function showError(message) {
      errorBox.textContent = message
      errorBox.classList.add('show')
      successBox.classList.remove('show')
    }

    function showSuccess(message) {
      successBox.textContent = message
      successBox.classList.add('show')
      errorBox.classList.remove('show')
    }

    function clearMessages() {
      errorBox.classList.remove('show')
      successBox.classList.remove('show')
      errorBox.textContent = ''
      successBox.textContent = ''
    }

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault()
      clearMessages()

      const email = document.getElementById('email').value.trim()
      const password = document.getElementById('password').value

      if (!email || !password) {
        showError('أدخل البريد الإلكتروني وكلمة المرور.')
        return
      }

      loginBtn.disabled = true
      loginBtn.textContent = 'جاري الدخول...'

      try {
        const { data, error } = await supabase.auth.signInWithPassword({
          email,
          password
        })

        if (error) {
          throw error
        }

        if (!data.user) {
          throw new Error('تعذر تسجيل الدخول.')
        }

        const { data: profile, error: profileError } = await supabase
          .from('profiles')
          .select('*')
          .eq('user_id', data.user.id)
          .maybeSingle()

        if (profileError) {
          console.error('Profile fetch error:', profileError)
          throw new Error('تعذر التحقق من نوع الحساب.')
        }

        if (profile && profile.role && profile.role !== 'manager') {
          await supabase.auth.signOut()
          throw new Error('هذا الدخول مخصص لمدير الجمعية فقط.')
        }

        showSuccess('تم تسجيل الدخول بنجاح. جاري تحويلك...')

        setTimeout(() => {
          window.location.href = 'dashboard.html'
        }, 700)

      } catch (err) {
        console.error(err)
        showError(err.message || 'فشل تسجيل الدخول.')
      } finally {
        loginBtn.disabled = false
        loginBtn.textContent = 'دخول'
      }
    })
  </script>

</body>
</html>
