<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>تسجيل الدخول - صندوق ساهل</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      font-family: Tahoma, Arial, sans-serif;
      background: #f5f7fb;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }

    .box {
      background: white;
      padding: 30px;
      width: 100%;
      max-width: 380px;
      border-radius: 10px;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      box-sizing: border-box;
      font-size: 15px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #0f766e;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 15px;
    }

    button:hover {
      background: #115e59;
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .msg {
      margin-top: 12px;
      text-align: center;
      font-size: 14px;
      line-height: 1.8;
      min-height: 24px;
    }

    .success {
      color: #166534;
    }

    .error {
      color: #b91c1c;
    }
  </style>
</head>
<body>
  <div class="box">
    <h2>تسجيل الدخول</h2>

    <input id="email" type="email" placeholder="البريد الإلكتروني" />
    <input id="password" type="password" placeholder="كلمة المرور" />

    <button id="loginBtn" type="button">تسجيل الدخول</button>

    <div class="msg" id="msg"></div>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const SUPABASE_URL = "https://qxyrpnexybxmfmtrnzpg.supabase.co";
    const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_QIxCZZAQvM_tBEPJp5-IDg_m9hZRHAT_auth.html";

    const supabase = createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);

    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const loginBtn = document.getElementById("loginBtn");
    const msg = document.getElementById("msg");

    function showMessage(text, type = "") {
      msg.textContent = text;
      msg.className = "msg " + type;
    }

    async function login() {
      showMessage("");

      const email = emailInput.value.trim();
      const password = passwordInput.value;

      if (!email || !password) {
        showMessage("أدخل البريد الإلكتروني وكلمة المرور.", "error");
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = "جارٍ تسجيل الدخول...";

      try {
        const { data, error } = await supabase.auth.signInWithPassword({
          email,
          password
        });

        if (error) throw error;

        showMessage("تم تسجيل الدخول بنجاح", "success");

        setTimeout(() => {
          window.location.href = "dashboard.html";
        }, 1200);

      } catch (err) {
        showMessage(err.message || "فشل تسجيل الدخول.", "error");
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = "تسجيل الدخول";
      }
    }

    loginBtn.addEventListener("click", login);
  </script>
</body>
</html>
