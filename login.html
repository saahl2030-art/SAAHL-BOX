<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

  const SUPABASE_URL = 'https://qxyrpnexybxmfmtrnzpg.supabase.co'
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF4eXJwbmV4eWJ4bWZtdHJuenBnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzODI5MTksImV4cCI6MjA4ODk1ODkxOX0.R6l1QAiKR5pHrSlnwqc3N31BU5zwl1iaEvX_-nSoDk8'

  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

  const loginForm = document.getElementById('loginForm')
  const loginBtn = document.getElementById('loginBtn')
  const msgBox = document.getElementById('msgBox')
  const overlay = document.getElementById('overlay')

  ;(async () => {
    overlay.classList.add('show')

    const { data: { user }, error } = await supabase.auth.getUser()

    if (error) {
      console.error('getUser error:', error)
    }

    if (user) {
      await redirectByRole(user.id)
      return
    }

    overlay.classList.remove('show')
  })()

  async function redirectByRole(userId) {
    try {
      const { data: profile, error } = await supabase
        .from('profiles')
        .select('role')
        .eq('id', userId)
        .maybeSingle()

      if (error) {
        console.error('profile error:', error)
        showMsg('تعذّر تحميل بيانات الحساب.', 'error')
        overlay.classList.remove('show')
        return
      }

      if (!profile) {
        showMsg('الحساب موجود لكن بياناته غير مكتملة.', 'error')
        overlay.classList.remove('show')
        return
      }

      if (profile.role === 'admin') {
        window.location.href = 'admin.html'
      } else {
        window.location.href = 'dashboard.html'
      }
    } catch (err) {
      console.error('redirectByRole crash:', err)
      showMsg('حدث خطأ أثناء التوجيه.', 'error')
      overlay.classList.remove('show')
    }
  }

  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault()
    clearMsg()

    const email = document.getElementById('email').value.trim()
    const password = document.getElementById('password').value

    if (!email || !password) {
      showMsg('أدخل البريد الإلكتروني وكلمة المرور.', 'error')
      return
    }

    loginBtn.disabled = true
    loginBtn.textContent = 'جاري الدخول...'
    overlay.classList.add('show')

    try {
      const { data, error } = await supabase.auth.signInWithPassword({ email, password })

      if (error) {
        showMsg(mapError(error.message), 'error')
        overlay.classList.remove('show')
        return
      }

      if (!data?.user) {
        showMsg('فشل تسجيل الدخول.', 'error')
        overlay.classList.remove('show')
        return
      }

      await redirectByRole(data.user.id)

    } catch (err) {
      console.error(err)
      showMsg('حدث خطأ غير متوقع. حاول مرة أخرى.', 'error')
      overlay.classList.remove('show')
    } finally {
      loginBtn.disabled = false
      loginBtn.textContent = 'دخول'
    }
  })

  function showMsg(text, type) {
    msgBox.textContent = text
    msgBox.className = `msg ${type} show`
  }

  function clearMsg() {
    msgBox.className = 'msg'
    msgBox.textContent = ''
  }

  function mapError(msg) {
    if (!msg) return 'حدث خطأ غير معروف'
    if (msg.includes('Invalid login credentials')) return 'البريد الإلكتروني أو كلمة المرور غير صحيحة'
    if (msg.includes('Email not confirmed')) return 'يرجى تأكيد بريدك الإلكتروني أولاً'
    if (msg.includes('Too many requests')) return 'محاولات كثيرة. انتظر قليلاً ثم حاول مجدداً'
    return msg
  }
</script>
