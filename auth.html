<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>إنشاء حساب - صندوق ساهل</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--primary:#1a6b8a;--primary2:#155972;--primary3:#e0f4fa;--teal:#0891b2;--red:#be123c;--redbg:#ffe4e6;--bg:#f4f8fb;--white:#fff;--border:#d4e4ee;--dark:#0d2233;--dark2:#163348;--muted:#5a7a90;--sh:0 1px 3px rgba(26,107,138,.08);--sh2:0 4px 16px rgba(26,107,138,.12);--sh3:0 20px 60px rgba(26,107,138,.15)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Tajawal',sans-serif;background:linear-gradient(135deg,#e8f5fb,#f4f8fb 60%,#e0f0f8);display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px;color:var(--dark)}
.box{background:var(--white);padding:34px 28px;width:100%;max-width:430px;border-radius:22px;box-shadow:var(--sh3);border:1px solid var(--border)}
h2{text-align:center;font-size:32px;font-weight:900;margin-bottom:6px;color:var(--dark)}
.sub{text-align:center;color:var(--muted);font-size:14px;margin-bottom:24px;line-height:1.9}
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;color:var(--dark2);font-weight:800;margin-bottom:6px}
input{width:100%;padding:13px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;font-family:'Tajawal',sans-serif;color:var(--dark);background:#fff;outline:none;transition:border-color .2s,box-shadow .2s}
input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(26,107,138,.12)}
.btn{width:100%;padding:13px;background:var(--primary);color:#fff;border:none;border-radius:12px;cursor:pointer;font-size:17px;font-weight:800;font-family:'Tajawal',sans-serif;transition:all .18s;box-shadow:0 2px 8px rgba(26,107,138,.25)}
.btn:hover{background:var(--primary2);transform:translateY(-1px);box-shadow:var(--sh2)}
.btn:disabled{opacity:.7;cursor:not-allowed;transform:none}
.msg{margin-top:14px;text-align:center;font-size:14px;font-weight:700;border-radius:10px;padding:0;min-height:20px}
.msg.ok{color:#155972;background:var(--primary3);border:1px solid #bae6fd;padding:12px}
.msg.err{color:#991b1b;background:var(--redbg);border:1px solid #fecdd3;padding:12px}
.links{margin-top:16px;text-align:center}
.links a{color:var(--primary);font-size:14px;font-weight:700;text-decoration:none}
.links a:hover{text-decoration:underline}
.step-indicator{display:flex;gap:8px;justify-content:center;margin-bottom:20px}
.step{width:32px;height:4px;border-radius:99px;background:var(--border);transition:background .3s}
.step.active{background:var(--primary)}
</style>
</head>
<body>
<div class="box">
  <div style="text-align:center;font-size:40px;margin-bottom:10px">🏦</div>
  <h2>إنشاء حساب</h2>
  <div class="sub">أنشئ حسابك وجمعيتك في خطوة واحدة</div>

  <div class="step-indicator">
    <div class="step active" id="step1ind"></div>
    <div class="step" id="step2ind"></div>
  </div>

  <!-- Step 1: Account Info -->
  <div id="step1">
    <div class="field"><label>الاسم الكامل *</label><input id="name" type="text" placeholder="اسمك الكامل"></div>
    <div class="field"><label>رقم الهاتف *</label><input id="phone" type="tel" placeholder="05xxxxxxxx"></div>
    <div class="field"><label>البريد الإلكتروني *</label><input id="email" type="email" placeholder="example@email.com" style="direction:ltr;text-align:left"></div>
    <div class="field"><label>كلمة المرور *</label><input id="password" type="password" placeholder="6 أحرف على الأقل"></div>
    <button class="btn" onclick="goToStep2()">التالي — بيانات الجمعية →</button>
  </div>

  <!-- Step 2: Group Info -->
  <div id="step2" style="display:none">
    <div class="field"><label>اسم الجمعية *</label><input id="groupName" type="text" placeholder="مثال: جمعية الأهل 2026"></div>
    <div class="field"><label>مبلغ الجمعية الشهري (د.إ) *</label><input id="groupAmount" type="number" placeholder="مثال: 1000" min="1"></div>
    <div class="field"><label>الخطة</label>
      <select id="planSelect" style="width:100%;padding:13px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;font-family:'Tajawal',sans-serif;background:#fff;color:var(--dark);outline:none">
        <option value="الخطة المجانية" data-limit="4">الخطة المجانية — حتى 4 أعضاء</option>
        <option value="جمعية صغيرة" data-limit="9">جمعية صغيرة — حتى 9 أعضاء (149 د.إ)</option>
        <option value="جمعية متوسطة" data-limit="18">جمعية متوسطة — حتى 18 عضو (199 د.إ)</option>
        <option value="جمعية كبيرة" data-limit="30">جمعية كبيرة — حتى 30 عضو (249 د.إ)</option>
        <option value="جمعية موسعة" data-limit="50">جمعية موسعة — حتى 50 عضو (349 د.إ)</option>
      </select>
    </div>
    <div style="display:flex;gap:10px">
      <button class="btn" style="background:#fff;color:var(--dark2);border:1px solid var(--border);box-shadow:var(--sh)" onclick="backToStep1()">← رجوع</button>
      <button class="btn" id="signupBtn" onclick="signup()">إنشاء الحساب والجمعية</button>
    </div>
  </div>

  <div class="msg" id="msg"></div>
  <div class="links" style="margin-top:16px">
    <a href="login.html">لديك حساب؟ تسجيل الدخول</a>
  </div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";
const supabase = createClient(
  "https://qxyrpnexybxmfmtrnzpg.supabase.co",
  "sb_publishable_QIxCZZAQvM_tBEPJp5-IDg_m9hZRHAT"
);

function showMsg(text, type) {
  var el = document.getElementById("msg");
  el.textContent = text;
  el.className = "msg " + (type || "");
}
function makeCode() {
  return Math.random().toString(36).substring(2,8).toUpperCase();
}

window.goToStep2 = function() {
  var name = document.getElementById("name").value.trim();
  var phone = document.getElementById("phone").value.trim();
  var email = document.getElementById("email").value.trim();
  var pass = document.getElementById("password").value;
  if (!name || !phone || !email || !pass) { showMsg("أدخل جميع الحقول", "err"); return; }
  if (pass.length < 6) { showMsg("كلمة المرور 6 أحرف على الأقل", "err"); return; }
  showMsg("");
  document.getElementById("step1").style.display = "none";
  document.getElementById("step2").style.display = "block";
  document.getElementById("step1ind").classList.remove("active");
  document.getElementById("step2ind").classList.add("active");
};

window.backToStep1 = function() {
  document.getElementById("step2").style.display = "none";
  document.getElementById("step1").style.display = "block";
  document.getElementById("step2ind").classList.remove("active");
  document.getElementById("step1ind").classList.add("active");
};

window.signup = async function() {
  var name = document.getElementById("name").value.trim();
  var phone = document.getElementById("phone").value.trim();
  var email = document.getElementById("email").value.trim();
  var pass = document.getElementById("password").value;
  var groupName = document.getElementById("groupName").value.trim();
  var amount = Number(document.getElementById("groupAmount").value || 0);
  var planSelect = document.getElementById("planSelect");
  var planName = planSelect.value;
  var membersLimit = Number(planSelect.options[planSelect.selectedIndex].dataset.limit || 4);

  if (!groupName || !amount) { showMsg("أدخل اسم الجمعية والمبلغ", "err"); return; }

  var btn = document.getElementById("signupBtn");
  btn.disabled = true;
  btn.textContent = "جاري الإنشاء...";
  showMsg("جاري إنشاء الحساب...", "");

  try {
    // 1. Create auth account
    var { data: authData, error: authError } = await supabase.auth.signUp({
      email, password: pass,
      options: { data: { name, phone } }
    });
    if (authError) throw authError;

    var userId = authData.user?.id;
    if (!userId) throw new Error("لم يتم الحصول على معرف المستخدم");

    // 2. Create group in Supabase
    var inviteCode = makeCode();
    var { error: groupError } = await supabase.from("groups").insert([{
      user_id: userId,
      manager_name: name,
      group_name: groupName,
      amount: amount,
      plan_name: planName,
      members_limit: membersLimit,
      invite_code: inviteCode
    }]);

    if (groupError) {
      console.error("Group error:", groupError);
      // Still proceed - group can be created later
      showMsg("تم إنشاء الحساب. يرجى إعداد بيانات الجمعية من لوحة التحكم.", "ok");
    } else {
      showMsg("✅ تم إنشاء الحساب والجمعية بنجاح! جاري الانتقال...", "ok");
    }

    setTimeout(function() {
      window.location.href = "login.html";
    }, 2000);

  } catch(err) {
    showMsg(err.message || "حدث خطأ. حاول مجدداً.", "err");
  } finally {
    btn.disabled = false;
    btn.textContent = "إنشاء الحساب والجمعية";
  }
};
</script>
</body>
</html>
