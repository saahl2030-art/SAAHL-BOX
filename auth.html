<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>صندوق ساهل</title>

  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">

  <style>
    body{
      font-family:'Tajawal',sans-serif;
      background:#f5f9ff;
      display:flex;
      align-items:center;
      justify-content:center;
      height:100vh;
      margin:0;
    }

    .box{
      background:#fff;
      padding:30px;
      border-radius:16px;
      width:100%;
      max-width:400px;
      box-shadow:0 10px 30px rgba(0,0,0,0.1);
      text-align:center;
    }

    h2{
      margin-bottom:20px;
      font-weight:900;
      color:#0a1628;
    }

    input{
      width:100%;
      padding:12px;
      margin-bottom:12px;
      border-radius:10px;
      border:1px solid #ccc;
      font-family:'Tajawal';
    }

    button{
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      background:#1f6fa5;
      color:#fff;
      font-weight:800;
      cursor:pointer;
    }

    button:hover{
      background:#185781;
    }

    .link{
      margin-top:10px;
      font-size:13px;
      color:#555;
      cursor:pointer;
    }

  </style>
</head>

<body>

<div class="box">
  <h2>إنشاء حساب</h2>

  <input type="text" placeholder="الاسم الكامل">
  <input type="email" placeholder="البريد الإلكتروني">
  <input type="password" placeholder="كلمة المرور">

  <button>إنشاء الحساب</button>

  <div class="link" onclick="goLogin()">لدي حساب بالفعل</div>
</div>

<script>
  function goLogin(){
    window.location.href = "login.html"
  }
</script>

</body>
</html>
