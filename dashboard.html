<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>لوحة التحكم</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:Arial;
background:#f4f6f8;
text-align:center;
padding:40px;
}

.box{
background:white;
padding:30px;
border-radius:10px;
max-width:450px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.plan{
font-size:22px;
color:#1a7f64;
margin-top:15px;
margin-bottom:20px;
}

button{
padding:10px 18px;
border:none;
background:#1a7f64;
color:white;
border-radius:5px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
<h2>مرحبا بك في صندوق ساهل</h2>

<p>الباقة التي اخترتها:</p>

<div class="plan" id="planName"></div>

<button onclick="window.location.href='plans.html'">تغيير الباقة</button>

</div>

<script>

const plan = localStorage.getItem("selectedPlan");

let name="";

if(plan==1){
name="الباقة الأساسية";
}

if(plan==2){
name="الباقة المتقدمة";
}

if(plan==3){
name="الباقة الاحترافية";
}

document.getElementById("planName").innerText=name || "لم يتم اختيار باقة بعد";

</script>

</body>
</html>
