<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>لوحة التحكم</title>
<style>
body{
font-family:Arial;
text-align:center;
background:#f5f5f5;
padding-top:100px;
}
.box{
background:white;
padding:40px;
border-radius:10px;
width:400px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}
button{
padding:10px 20px;
background:#1a7f64;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
<h2>مرحبا بك في منصة ساهل</h2>
<p>تم تسجيل الدخول بنجاح</p>

<button onclick="logout()">تسجيل الخروج</button>
</div>

<script>
function logout(){
localStorage.removeItem("supabase.auth.token");
window.location.href="login.html";
}
</script>

</body>
</html>
