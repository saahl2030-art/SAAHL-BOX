<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

  const SUPABASE_URL = 'https://qxyrpnexybxmfmtrnzpg.supabase.co'
  const SUPABASE_ANON_KEY = 'sb_publishable_QIxCZZAQvM_tBEPJp5-IDg_m9hZRHAT'

  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
  window.supabase = supabase

  const managerNameEl = document.getElementById('manager-name')
  const societyNameEl = document.getElementById('society-name')
  const createBtn = document.getElementById('create-society-btn')
  const statusEl = document.getElementById('create-society-status')

  try {
    const { data: { user }, error: userError } = await supabase.auth.getUser()

    if (userError) {
      console.error('Auth error:', userError)
      window.location.href = 'login.html'
      throw userError
    }

    if (!user) {
      window.location.href = 'login.html'
      throw new Error('No authenticated user')
    }

    console.log('User:', user)

    if (managerNameEl) {
      managerNameEl.textContent = user.email || '...'
    }

    const { data: profile, error: profileError } = await supabase
      .from('الملفات الشخصية')
      .select('*')
      .eq('user_id', user.id)
      .maybeSingle()

    if (profileError) {
      console.error('Profile error:', profileError)
    } else if (profile) {
      console.log('Profile:', profile)

      if (managerNameEl) {
        managerNameEl.textContent =
          profile.full_name ||
          profile['الاسم الكامل'] ||
          profile.name ||
          user.email ||
          '...'
      }
    }

    const { data: society, error: societyError } = await supabase
      .from('الجمعيات')
      .select('*')
      .eq('manager_user_id', user.id)
      .limit(1)
      .maybeSingle()

    if (societyError) {
      console.error('Society error:', societyError)
    } else if (society) {
      console.log('Society:', society)

      if (societyNameEl) {
        societyNameEl.textContent = society['الاسم'] || society.name || '...'
      }
    } else {
      if (societyNameEl) {
        societyNameEl.textContent = 'لا توجد جمعية بعد'
      }
    }

    if (createBtn) {
      createBtn.addEventListener('click', async () => {
        const name = prompt('اكتب اسم الجمعية')

        if (!name || !name.trim()) return

        if (statusEl) {
          statusEl.textContent = 'جاري الإنشاء...'
        }

        const { error: insertError } = await supabase
          .from('الجمعيات')
          .insert([
            {
              'الاسم': name.trim(),
              'manager_user_id': user.id
            }
          ])

        if (insertError) {
          console.error('Create society error:', insertError)
          if (statusEl) {
            statusEl.textContent = 'خطأ في إنشاء الجمعية'
          }
          return
        }

        if (statusEl) {
          statusEl.textContent = 'تم إنشاء الجمعية بنجاح'
        }

        location.reload()
      })
    }
  } catch (err) {
    console.error('Dashboard fatal error:', err)
  }
</script>
