<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>لوحة مدير الجمعية - صندوق ساهل</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet" />

  <style>
    :root{
      --primary:#1a6b8a;
      --primary2:#155972;
      --primary3:#e0f4fa;
      --teal:#0891b2;
      --gold:#b45309;
      --goldbg:#fef3c7;
      --red:#be123c;
      --redbg:#ffe4e6;
      --green:#15803d;
      --greenbg:#dcfce7;
      --graybg:#f3f4f6;
      --bg:#f4f8fb;
      --white:#ffffff;
      --s1:#eef4f8;
      --s2:#dde8f0;
      --border:#d4e4ee;
      --dark:#0d2233;
      --dark2:#163348;
      --dark3:#2c4a61;
      --muted:#5a7a90;
      --muted2:#8aa8bc;
      --r:12px;
      --sh:0 1px 3px rgba(26,107,138,.08),0 1px 2px rgba(26,107,138,.06);
      --sh2:0 4px 16px rgba(26,107,138,.12),0 2px 4px rgba(26,107,138,.06);
      --sh3:0 20px 60px rgba(26,107,138,.15);
    }

    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:'Tajawal',sans-serif;
      background:var(--bg);
      color:var(--dark);
      min-height:100vh;
    }

    .nav{
      position:sticky;
      top:0;
      z-index:200;
      background:rgba(255,255,255,.92);
      backdrop-filter:blur(20px);
      border-bottom:1px solid var(--border);
      height:64px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 24px;
      box-shadow:var(--sh);
    }

    .nav-logo{
      display:flex;
      align-items:center;
      gap:9px;
      font-size:20px;
      font-weight:900;
      color:var(--dark);
      text-decoration:none;
    }

    .nav-actions{
      display:flex;
      gap:8px;
      align-items:center;
      flex-wrap:wrap;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      padding:10px 18px;
      border:none;
      border-radius:12px;
      font-family:'Tajawal',sans-serif;
      font-size:14px;
      font-weight:800;
      cursor:pointer;
      transition:all .18s;
      text-decoration:none;
      white-space:nowrap;
    }

    .btn:hover{transform:translateY(-1px);box-shadow:var(--sh2)}
    .btn:active{transform:scale(.98)}
    .btn-p{background:var(--primary);color:#fff}
    .btn-d{background:var(--dark2);color:#fff}
    .btn-w{background:#fff;border:1px solid var(--border);color:var(--dark3);box-shadow:var(--sh)}
    .btn-t{background:var(--teal);color:#fff}
    .btn-r{background:var(--red);color:#fff}
    .btn-sm{padding:7px 12px;font-size:13px;border-radius:10px}
    .btn-full{width:100%}

    .page{
      max-width:1320px;
      margin:0 auto;
      padding:24px 20px 80px;
    }

    .hero{
      background:linear-gradient(135deg,#0d2233 0%,#1a3d52 50%,#0d2233 100%);
      color:#fff;
      border-radius:24px;
      padding:28px;
      box-shadow:var(--sh3);
      margin-bottom:20px;
      display:flex;
      justify-content:space-between;
      gap:16px;
      flex-wrap:wrap;
      align-items:flex-start;
    }

    .hero h1{
      font-size:34px;
      font-weight:900;
      margin-bottom:8px;
    }

    .hero p{
      color:rgba(255,255,255,.82);
      line-height:1.9;
      font-size:14px;
      max-width:760px;
    }

    .hero-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:14px;
      margin-bottom:18px;
    }

    .stat{
      background:#fff;
      border:1px solid var(--border);
      border-radius:18px;
      padding:18px;
      box-shadow:var(--sh);
    }

    .stat .label{
      color:var(--muted);
      font-size:12px;
      font-weight:700;
      margin-bottom:8px;
    }

    .stat .value{
      font-size:30px;
      font-weight:900;
      line-height:1;
      color:var(--dark);
    }

    .layout{
      display:grid;
      grid-template-columns:320px 1fr;
      gap:18px;
      align-items:start;
    }

    .card{
      background:#fff;
      border:1px solid var(--border);
      border-radius:20px;
      box-shadow:var(--sh);
      padding:20px;
      margin-bottom:18px;
    }

    .card-title{
      font-size:18px;
      font-weight:900;
      margin-bottom:14px;
      color:var(--dark);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }

    .mini{
      font-size:13px;
      color:var(--muted);
      line-height:1.8;
    }

    .field{
      margin-bottom:12px;
    }

    .field label{
      display:block;
      font-size:12px;
      color:var(--dark2);
      font-weight:800;
      margin-bottom:6px;
    }

    input, select{
      width:100%;
      padding:12px 13px;
      border:1.5px solid var(--border);
      border-radius:10px;
      font-size:14px;
      font-family:'Tajawal',sans-serif;
      outline:none;
      transition:border-color .2s,box-shadow .2s;
      background:#fff;
      color:var(--dark);
    }

    input:focus,select:focus{
      border-color:var(--primary);
      box-shadow:0 0 0 3px rgba(26,107,138,.12);
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:5px;
      padding:4px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
      white-space:nowrap;
    }

    .b-pending{background:var(--goldbg);color:#92400e}
    .b-paid{background:var(--greenbg);color:var(--green)}
    .b-late{background:var(--redbg);color:#991b1b}
    .b-upcoming{background:var(--primary3);color:var(--primary2)}
    .b-neutral{background:var(--graybg);color:#4b5563}

    .table-wrap{
      overflow:auto;
      border:1px solid var(--border);
      border-radius:16px;
    }

    table{
      width:100%;
      border-collapse:collapse;
      min-width:980px;
      background:#fff;
    }

    thead th{
      background:var(--s1);
      color:var(--muted);
      font-size:12px;
      font-weight:800;
      padding:12px 10px;
      text-align:right;
      border-bottom:1px solid var(--border);
    }

    tbody td{
      padding:13px 10px;
      border-bottom:1px solid var(--border);
      font-size:14px;
      vertical-align:middle;
    }

    tbody tr:hover{
      background:#fbfdff;
    }

    .name-strong{
      font-weight:900;
      color:var(--dark);
    }

    .toolbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:14px;
    }

    .toolbar-left,.toolbar-right{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
    }

    .empty{
      text-align:center;
      color:var(--muted);
      padding:30px 14px;
      font-size:14px;
    }

    .list{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .req{
      border:1px solid var(--border);
      border-radius:14px;
      padding:14px;
      background:#fff;
    }

    .req-top{
      display:flex;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:8px;
    }

    .req-name{
      font-size:16px;
      font-weight:900;
      color:var(--dark);
    }

    .req-meta{
      color:var(--muted);
      font-size:13px;
      line-height:1.8;
    }

    .req-actions{
      margin-top:10px;
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .modal-bg{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.45);
      display:none;
      align-items:center;
      justify-content:center;
      padding:16px;
      z-index:300;
    }

    .modal-bg.show{
      display:flex;
    }

    .modal{
      width:100%;
      max-width:520px;
      background:#fff;
      border-radius:20px;
      box-shadow:var(--sh3);
      border:1px solid var(--border);
      padding:22px;
    }

    .modal-title{
      font-size:22px;
      font-weight:900;
      margin-bottom:14px;
    }

    .modal-actions{
      display:flex;
      gap:8px;
      justify-content:flex-end;
      margin-top:12px;
      flex-wrap:wrap;
    }

    .group-box{
      border:1px solid var(--border);
      background:#fbfdff;
      border-radius:16px;
      padding:14px;
    }

    .group-box h3{
      font-size:18px;
      font-weight:900;
      margin-bottom:6px;
    }

    .group-box p{
      color:var(--muted);
      font-size:13px;
      line-height:1.8;
    }

    .notice{
      margin-top:12px;
      padding:12px;
      border-radius:12px;
      font-size:13px;
      line-height:1.9;
      font-weight:700;
      display:none;
    }

    .notice.show{display:block}
    .notice.ok{background:var(--primary3);color:var(--primary2);border:1px solid #b6e1f0}
    .notice.err{background:var(--redbg);color:#991b1b;border:1px solid #fecdd3}

    @media(max-width:1100px){
      .stats{grid-template-columns:repeat(2,1fr)}
      .layout{grid-template-columns:1fr}
    }

    @media(max-width:640px){
      .nav{padding:0 14px}
      .page{padding:16px 14px 60px}
      .hero h1{font-size:26px}
      .stats{grid-template-columns:1fr}
    }
  </style>
</head>
