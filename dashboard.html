<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم - صندوق ساهل</title>

<style>
body{
  font-family:Tahoma;
  background:#eef3f7;
  margin:0;
  padding:20px;
}

/* HEADER */
.header{
  background:linear-gradient(135deg,#0f172a,#1e3a5f);
  color:white;
  padding:25px;
  border-radius:16px;
  margin-bottom:20px;
}

.header h1{
  margin:0;
  font-size:24px;
}

.header p{
  margin-top:8px;
  color:#cbd5e1;
}

/* BUTTONS */
.actions{
  margin-top:15px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.btn{
  padding:10px 14px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:14px;
}

.primary{
  background:#0ea5e9;
  color:white;
}

.secondary{
  background:#334155;
  color:white;
}

/* CARDS */
.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:15px;
  margin-top:20px;
}

.card{
  background:white;
  padding:15px;
  border-radius:12px;
  text-align:center;
  box-shadow:0 0 10px rgba(0,0,0,0.05);
}

.card h3{
  margin:0;
  font-size:14px;
  color:#555;
}

.card p{
  font-size:22px;
  margin:8px 0 0;
  font-weight:bold;
}

/* TABLE */
.table-box{
  margin-top:25px;
  background:white;
  padding:15px;
  border-radius:12px;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:10px;
  border-bottom:1px solid #eee;
  text-align:center;
}

.overdue{
  color:red;
  font-weight:bold;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <h1>لوحة إدارة الجمعية</h1>
  <p>
  تحكم كامل في الجمعية: إدارة الأعضاء، متابعة الاستحقاقات، وإرسال الدعوات بسهولة.
  </p>

  <div class="actions">
    <button class="btn primary" onclick="addMember()">➕ إضافة عضو</button>
    <button class="btn secondary" onclick="copyTable()">📋 نسخ الجدول</button>
    <button class="btn secondary" onclick="shareInvite()">🔗 دعوة الأعضاء</button>
  </div>
</div>

<!-- STATS -->
<div class="stats">
  <div class="card">
    <h3>اسم الجمعية</h3>
    <p id="groupName">الأهل</p>
  </div>

  <div class="card">
    <h3>عدد الأعضاء</h3>
    <p id="count">0</p>
  </div>

  <div class="card">
    <h3>المتأخرون</h3>
    <p id="late">0</p>
  </div>
</div>

<!-- TABLE -->
<div class="table-box">
  <h3>جدول الأعضاء</h3>

  <table id="membersTable">
    <thead>
      <tr>
        <th>الاسم</th>
        <th>الشهر</th>
        <th>الحالة</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script>
let members = [];

function render(){
  const tbody = document.querySelector("tbody");
  tbody.innerHTML = "";

  let lateCount = 0;

  members.forEach(m=>{
    const tr = document.createElement("tr");

    if(m.status === "متأخر"){
      tr.classList.add("overdue");
      lateCount++;
    }

    tr.innerHTML = `
      <td>${m.name}</td>
      <td>${m.month}</td>
      <td>${m.status}</td>
    `;

    tbody.appendChild(tr);
  });

  document.getElementById("count").textContent = members.length;
  document.getElementById("late").textContent = lateCount;
}

/* ADD MEMBER */
function addMember(){
  const name = prompt("اسم العضو:");
  if(!name) return;

  const month = prompt("شهر الاستحقاق:");
  if(!month) return;

  members.push({
    name,
    month,
    status:"منتظم"
  });

  render();
}

/* COPY TABLE */
function copyTable(){
  let text = "جدول الجمعية:\n\n";

  members.forEach(m=>{
    text += `${m.name} - ${m.month} - ${m.status}\n`;
  });

  navigator.clipboard.writeText(text);
  alert("تم نسخ الجدول");
}

/* SHARE LINK */
function shareInvite(){
  const code = "NNH5LZ";
  const link = `https://saahl2030-art.github.io/join.html?code=${code}`;

  navigator.clipboard.writeText(link);

  window.open(`https://wa.me/?text=${encodeURIComponent("انضم للجمعية:\n" + link)}`);

  alert("تم نسخ رابط الدعوة وفتح واتساب");
}

/* DEMO */
members = [
  {name:"محمد", month:"يناير", status:"منتظم"},
  {name:"أحمد", month:"فبراير", status:"متأخر"}
];

render();
</script>

</body>
</html>
