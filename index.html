<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ساهل — منصة الجمعيات المالية</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Tajawal', sans-serif;
  background: #04070f;
  color: #ddeeff;
  min-height: 100vh;
  background-image: radial-gradient(ellipse at 50% 0%, #0a1d4a 0%, #04070f 60%);
}

/* ─── TOPBAR ─── */
.topbar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(4,7,15,0.95);
  border-bottom: 1px solid rgba(99,179,255,0.1);
  backdrop-filter: blur(20px);
  height: 60px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px;
}
.logo {
  display: flex; align-items: center; gap: 8px;
  font-size: 20px; font-weight: 900;
}
.logo-text {
  background: linear-gradient(135deg, #4f9eff, #00e5b0);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.login-btn {
  background: rgba(79,158,255,0.1);
  border: 1px solid rgba(79,158,255,0.25);
  color: #4f9eff;
  padding: 8px 18px;
  border-radius: 10px;
  font-family: 'Tajawal', sans-serif;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  text-decoration: none;
  display: inline-flex; align-items: center; gap: 6px;
}
.login-btn:hover {
  background: rgba(79,158,255,0.18);
  border-color: rgba(79,158,255,0.4);
  transform: translateY(-1px);
}

/* ─── HERO ─── */
.hero-section {
  text-align: center;
  padding: 52px 20px 36px;
}
.hero-icon {
  font-size: 60px;
  margin-bottom: 16px;
  filter: drop-shadow(0 0 24px rgba(79,158,255,0.4));
  display: block;
}
.hero-title {
  font-size: 32px;
  font-weight: 900;
  background: linear-gradient(135deg, #4f9eff, #00e5b0);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
  line-height: 1.2;
}
.hero-sub {
  font-size: 14px;
  color: #5a7aa0;
  font-weight: 500;
}

/* ─── SEARCH ─── */
.search-wrap {
  max-width: 560px;
  margin: 0 auto 28px;
  padding: 0 16px;
}
.search-box {
  display: flex;
  align-items: center;
  gap: 10px;
  background: rgba(255,255,255,0.04);
  border: 1.5px solid rgba(99,179,255,0.18);
  border-radius: 13px;
  padding: 10px 16px;
  transition: border-color 0.2s;
}
.search-box:focus-within {
  border-color: rgba(79,158,255,0.45);
  background: rgba(79,158,255,0.05);
}
.search-box span { font-size: 16px; }
.search-box input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: #ddeeff;
  font-family: 'Tajawal', sans-serif;
  font-size: 14px;
}
.search-box input::placeholder { color: #5a7aa0; }

/* ─── JAMEIA CARDS ─── */
.list-wrap {
  max-width: 560px;
  margin: 0 auto;
  padding: 0 16px 80px;
}
.section-title {
  font-size: 13px;
  font-weight: 700;
  color: #5a7aa0;
  letter-spacing: 0.5px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.jcard {
  background: #080f1e;
  border: 1px solid rgba(99,179,255,0.1);
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 14px;
  cursor: pointer;
  transition: all 0.2s;
  text-decoration: none;
}
.jcard:hover {
  border-color: rgba(79,158,255,0.28);
  background: #0c1528;
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
}
.jcard-icon {
  width: 50px; height: 50px;
  border-radius: 13px;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px;
  flex-shrink: 0;
}
.jcard-info { flex: 1; min-width: 0; }
.jcard-name {
  font-size: 16px;
  font-weight: 800;
  color: #ddeeff;
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.jcard-meta {
  font-size: 12px;
  color: #5a7aa0;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.meta-pill {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 99px;
  padding: 2px 8px;
  font-size: 11px;
}
.meta-pill.month { color: #fbbf24; border-color: rgba(251,191,36,0.2); background: rgba(251,191,36,0.06); }
.meta-pill.members { color: #4f9eff; border-color: rgba(79,158,255,0.2); background: rgba(79,158,255,0.06); }
.meta-pill.amount { color: #00e5b0; border-color: rgba(0,229,176,0.2); background: rgba(0,229,176,0.06); }
.jcard-arrow {
  color: #5a7aa0;
  font-size: 18px;
  flex-shrink: 0;
}

/* ─── PROGRESS BAR ─── */
.jprog {
  margin-top: 10px;
}
.jprog-bar {
  height: 4px;
  background: rgba(255,255,255,0.06);
  border-radius: 99px;
  overflow: hidden;
}
.jprog-fill {
  height: 100%;
  border-radius: 99px;
  background: linear-gradient(90deg, #00e5b0, #4f9eff);
  transition: width 0.6s ease;
}
.jprog-lbl {
  display: flex;
  justify-content: space-between;
  font-size: 10px;
  color: #5a7aa0;
  margin-top: 4px;
}

/* ─── EMPTY STATE ─── */
.empty {
  text-align: center;
  padding: 48px 20px;
  color: #5a7aa0;
}
.empty-icon { font-size: 48px; margin-bottom: 12px; display: block; opacity: 0.6; }
.empty-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
.empty-sub { font-size: 13px; }

/* ─── FOOTER INFO ─── */
.footer-info {
  max-width: 560px;
  margin: 0 auto;
  padding: 0 16px;
  text-align: center;
}
.footer-card {
  background: rgba(79,158,255,0.04);
  border: 1px solid rgba(79,158,255,0.1);
  border-radius: 12px;
  padding: 14px;
  font-size: 12px;
  color: #5a7aa0;
  line-height: 1.7;
}
.footer-card strong { color: #4f9eff; }

/* ─── TOAST ─── */
#toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: #00e5b0; color: #042e22;
  padding: 11px 24px; border-radius: 99px;
  font-weight: 700; font-size: 14px;
  transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
  z-index: 9999; pointer-events: none;
  white-space: nowrap;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}
#toast.show { transform: translateX(-50%) translateY(0); }

@media (max-width: 500px) {
  .hero-title { font-size: 26px; }
  .topbar { padding: 0 14px; }
}
</style>
</head>
<body>

<!-- ═══ TOPBAR ═══ -->
<div class="topbar">
  <div class="logo">
    <span>🏦</span>
    <span class="logo-text">ساهل</span>
  </div>
  <a href="index.html#admin" class="login-btn">🔐 دخول المدير</a>
</div>

<!-- ═══ HERO ═══ -->
<div class="hero-section">
  <span class="hero-icon">🏦</span>
  <h1 class="hero-title">منصة ساهل</h1>
  <p class="hero-sub">للجمعيات المالية الموثوقة والمنظّمة</p>
</div>

<!-- ═══ SEARCH ═══ -->
<div class="search-wrap">
  <div class="search-box">
    <span>🔍</span>
    <input type="text" id="searchInput" placeholder="ابحث عن جمعية..." oninput="filterList(this.value)">
  </div>
</div>

<!-- ═══ LIST ═══ -->
<div class="list-wrap">
  <div class="section-title">📋 الجمعيات المتاحة</div>
  <div id="jList">
    <!-- سيتم ملؤه بالجافاسكريبت -->
  </div>

  <div class="footer-info" style="margin-top:20px">
    <div class="footer-card">
      هل أنت مدير جمعية؟ اضغط على <strong>دخول المدير</strong> في الأعلى
      أو تواصل مع مشرف المنصة لإنشاء جمعيتك 🏦
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const SK = 'sahel_v3';
const MN = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];

var S = { jameias: [], prices: {} };

// ─── LOAD LOCAL DATA ───
function loadData() {
  try {
    var d = localStorage.getItem(SK);
    if (d) S = Object.assign({}, S, JSON.parse(d));
  } catch(e) {}
  if (!S.jameias) S.jameias = [];
  S.jameias.forEach(function(j) {
    if (!j.members) j.members = [];
    if (!j.paidMembers) j.paidMembers = {};
  });
}

// ─── SYNC FROM CLOUD ───
async function cloudSync() {
  if (!S.binId) return;
  try {
    var h = S.apiKey ? { 'X-Master-Key': S.apiKey } : {};
    var r = await fetch('https://api.jsonbin.io/v3/b/' + S.binId + '/latest', { headers: h });
    var d = await r.json();
    var keep = { apiKey: S.apiKey, binId: S.binId, superPass: S.superPass, adminPass: S.adminPass };
    S = Object.assign({}, S, d.record, keep);
    S.jameias.forEach(function(j) {
      if (!j.members) j.members = [];
      if (!j.paidMembers) j.paidMembers = {};
    });
    localStorage.setItem(SK, JSON.stringify(S));
    renderList();
  } catch(e) {}
}

// ─── RENDER ───
function renderList(filter) {
  var box = document.getElementById('jList');
  var active = S.jameias.filter(function(j) { return !j.archived; });

  if (filter) {
    active = active.filter(function(j) {
      return j.name && j.name.indexOf(filter) !== -1;
    });
  }

  if (!active.length) {
    box.innerHTML = '<div class="empty">'
      + '<span class="empty-icon">🔍</span>'
      + '<div class="empty-title">لا توجد جمعيات متاحة</div>'
      + '<div class="empty-sub">تواصل مع مشرف المنصة لإنشاء جمعيتك</div>'
      + '</div>';
    return;
  }

  box.innerHTML = active.map(function(j) {
    var pc = j.members.filter(function(m) { return j.paidMembers && j.paidMembers[m.id]; }).length;
    var tot = j.members.length;
    var pct = tot > 0 ? Math.round(pc / tot * 100) : 0;
    var colors = ['#4f9eff,#1d6fd4','#059669,#00e5b0','#b45309,#fbbf24','#5b21b6,#a78bfa','#b91c1c,#f43f5e'];
    var ci = j.color ? j.color : colors[Math.abs(j.id.charCodeAt(2)||0) % colors.length];

    return '<div class="jcard" onclick="openJameia(\'' + j.id + '\')">'
      + '<div class="jcard-icon" style="background:linear-gradient(135deg,' + ci + ')">' + (j.icon || '🏦') + '</div>'
      + '<div class="jcard-info">'
        + '<div class="jcard-name">' + esc(j.name) + '</div>'
        + '<div class="jcard-meta">'
          + (j.monthName ? '<span class="meta-pill month">📅 ' + esc(j.monthName) + '</span>' : '')
          + '<span class="meta-pill members">👥 ' + tot + ' عضو</span>'
          + (j.amount ? '<span class="meta-pill amount">💰 ' + j.amount + ' د.إ</span>' : '')
        + '</div>'
        + (tot > 0 ? '<div class="jprog">'
          + '<div class="jprog-bar"><div class="jprog-fill" style="width:' + pct + '%"></div></div>'
          + '<div class="jprog-lbl"><span>تقدم الدفعات</span><span>' + pc + '/' + tot + '</span></div>'
          + '</div>' : '')
      + '</div>'
      + '<div class="jcard-arrow">←</div>'
    + '</div>';
  }).join('');
}

function filterList(val) {
  renderList(val.trim());
}

function openJameia(id) {
  // تنتقل لصفحة الجمعية العامة (للأعضاء)
  window.location.href = 'index.html?j=' + id;
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─── BOOT ───
loadData();
renderList();
cloudSync();
// تحديث كل 30 ثانية
setInterval(function() {
  cloudSync();
}, 30000);
</script>
</body>
</html>
