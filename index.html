<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>صندوق ساهل</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  font-family:Arial;
  background:#f4f6f8;
  margin:0;
  text-align:center;
}
.page{display:none;padding:30px;}
.page.active{display:block;}

button{
  padding:10px 18px;
  border:none;
  background:#1a7f64;
  color:white;
  border-radius:6px;
  cursor:pointer;
  margin:5px;
}
input{
  padding:10px;
  width:90%;
  margin:8px 0;
}
</style>
</head>

<body>

<!-- الصفحة الرئيسية -->
<div id="home" class="page active">
  <h2>صندوق ساهل</h2>
  <button onclick="go('plans')">الخطط</button>
  <button onclick="go('login')">دخول</button>
  <button onclick="go('register')">ابدأ</button>
</div>

<!-- الخطط -->
<div id="plans" class="page">
  <h2>اختر خطتك</h2>

  <button onclick="selectPlan('free')">مجانية (4 أعضاء)</button>
  <button onclick="selectPlan('s')">صغيرة (9 أعضاء)</button>
  <button onclick="selectPlan('m')">متوسطة (18)</button>

  <br><br>
  <button onclick="go('register')">متابعة</button>
</div>

<!-- تسجيل -->
<div id="register" class="page">
  <h2>تسجيل</h2>

  <input id="email" placeholder="البريد">
  <input id="password" type="password" placeholder="كلمة المرور">

  <button onclick="register()">إنشاء حساب</button>
</div>

<!-- دخول -->
<div id="login" class="page">
  <h2>دخول</h2>

  <input id="loginEmail" placeholder="البريد">
  <input id="loginPass" type="password" placeholder="كلمة المرور">

  <button onclick="login()">دخول</button>
</div>

<!-- لوحة التحكم -->
<div id="dashboard" class="page">
  <h2>لوحة التحكم</h2>

  <p id="planText"></p>

  <input id="members" type="number" placeholder="عدد الأعضاء">

  <button onclick="createGroup()">إنشاء جمعية</button>

  <div id="result"></div>

  <button onclick="logout()">خروج</button>
</div>

<script>

// Supabase
const supabase = window.supabase.createClient(
  "https://qaqmpuxyzmxcpmdszuez.supabase.co",
  "sb_publishable_QIxCZZAQvM_tBEPJp5-IDg_m9hZRHAT"
);

// الخطط
const plans = {
  free:{max:4,name:"مجانية"},
  s:{max:9,name:"صغيرة"},
  m:{max:18,name:"متوسطة"}
};

let currentPlan = "free";

// تنقل الصفحات
function go(p){
  document.querySelectorAll(".page").forEach(el=>el.classList.remove("active"));
  document.getElementById(p).classList.add("active");
}

// اختيار خطة
function selectPlan(p){
  currentPlan = p;
  localStorage.setItem("plan",p);
  alert("تم اختيار الخطة");
}

// تسجيل
async function register(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const {error} = await supabase.auth.signUp({email,password});

  if(error){
    alert(error.message);
    return;
  }

  localStorage.setItem("plan",currentPlan);

  go("dashboard");
  loadPlan();
}

// دخول
async function login(){
  const email = document.getElementById("loginEmail").value;
  const password = document.getElementById("loginPass").value;

  const {error} = await supabase.auth.signInWithPassword({email,password});

  if(error){
    alert("خطأ تسجيل الدخول");
    return;
  }

  go("dashboard");
  loadPlan();
}

// تحميل الخطة
function loadPlan(){
  const p = localStorage.getItem("plan") || "free";
  currentPlan = p;
  document.getElementById("planText").innerText =
    "الخطة: " + plans[p].name + " - حد الأعضاء: " + plans[p].max;
}

// إنشاء جمعية
function createGroup(){
  const members = Number(document.getElementById("members").value);

  if(members > plans[currentPlan].max){
    alert("تجاوز الحد");
    return;
  }

  const code = Math.random().toString(36).substring(2,7);

  const link = window.location.origin + "?join=" + code;

  document.getElementById("result").innerHTML = `
    <p>تم الإنشاء</p>
    <p>الكود: ${code}</p>
    <p>${link}</p>
  `;
}

// خروج
function logout(){
  supabase.auth.signOut();
  go("home");
}

</script>

</body>
</html>
